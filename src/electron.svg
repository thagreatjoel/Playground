<svg width="128" height="128" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg">

  <style>
    .glow {
      filter: drop-shadow(0 0 6px #b2f167);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .jitter {
      animation: jitter 0.3s infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 4px #b2f167); }
      50% { filter: drop-shadow(0 0 14px #b2f167); }
    }

    @keyframes jitter {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(1px, -1px); }
      50%  { transform: translate(-1px, 1px); }
      75%  { transform: translate(1px, 1px); }
      100% { transform: translate(0, 0); }
    }
  </style>

  <!-- Background -->
  <rect x="20" y="20" width="88" height="88" rx="20"
        fill="#111827"/>

  <!-- Electron group -->
  <g class="glow jitter">

    <!-- e -->
    <text x="50%" y="60%" text-anchor="middle"
          font-size="48"
          font-family="monospace"
          fill="#e5e7eb"
          font-weight="bold">
      e
    </text>

    <!-- minus -->
    <text x="78" y="38"
          font-size="22"
          font-family="monospace"
          fill="#e5e7eb"
          font-weight="bold">
      −
    </text>

  </g>

</svg>
