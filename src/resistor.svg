<svg width="128" height="128" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg">

  <g transform="rotate(45 64 64)">

    <!-- Leads -->
    <rect x="0" y="60" width="40" height="8" fill="#9ca3af"/>
    <rect x="88" y="60" width="40" height="8" fill="#9ca3af"/>

    <!-- Resistor body -->
    <rect x="40" y="52" width="48" height="24" fill="#d1d5db"/>

    <!-- Pixel shading -->
    <rect x="44" y="56" width="8" height="8" fill="#e5e7eb"/>
    <rect x="52" y="56" width="8" height="8" fill="#cbd5f5"/>
    <rect x="60" y="56" width="8" height="8" fill="#e5e7eb"/>
    <rect x="68" y="56" width="8" height="8" fill="#cbd5f5"/>

    <!-- Color bands -->
    <rect x="48" y="52" width="4" height="24" fill="#ef4444"/>
    <rect x="58" y="52" width="4" height="24" fill="#f59e0b"/>
    <rect x="68" y="52" width="4" height="24" fill="#8b5cf6"/>

  </g>

</svg>
