<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Hardware Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <script defer src="src/script.js"></script>
  <style>
    body { filter: none; opacity: 1; }

    .user-card {
      background: white;
      border: 1px solid #cfcfcf;
      border-bottom: 3px solid #000;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .user-card:hover { transform: translateY(-2px); }

    .user-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid #000;
      object-fit: cover;
      flex-shrink: 0;
      background: #b2f167;
    }

    .user-name  { font-weight: 600; font-size: 0.9rem; }
    .user-sub   { font-size: 0.75rem; color: #888; }

    .chip {
      font-size: 0.68rem; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
      border: 1px solid #000;
      white-space: nowrap;
    }
    .chip.si { background: #fff8e1; border-color: #f0a000; color: #7a5000; }
    .chip.co { background: #e8f5e9; border-color: #388e3c; color: #1b5e20; }
    .chip.di { background: #e8eaf6; border-color: #3949ab; color: #1a237e; }

    #search {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-bottom: 3px solid #000;
      border-radius: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      background: white;
    }

    .skeleton {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 16px;
      height: 72px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .modal-bg.show { display: flex; }

    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      border-top: 3px solid #000;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid #000;
      object-fit: cover;
      display: block;
      margin: 0 auto 12px;
      background: #b2f167;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px dashed #e0e0e0;
      font-size: 0.82rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; font-size: 0.72rem; }
    .info-value { font-weight: 600; font-family: monospace; font-size: 0.8rem; text-align: right; max-width: 55%; word-break: break-all; }

    .copy-btn {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 0.68rem;
      cursor: pointer;
      margin-left: 5px;
      font-family: 'Space Grotesk', sans-serif;
      transition: 0.15s;
    }
    .copy-btn:hover { background: #b2f167; border-color: #000; }

    /* Admin edit */
    .edit-section {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px dashed #e0e0e0;
    }
    .edit-section.show { display: block; }
    .edit-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .edit-row > div { flex: 1; }
    .edit-row label { font-size: 0.7rem; color: #555; display: block; margin-bottom: 2px; }
    .edit-row input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
    }

    .btn {
      background: #b2f167;
      border: 1px solid #000;
      border-bottom: 3px solid #000;
      border-radius: 10px;
      padding: 7px 16px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: 0.15s;
      margin: 3px;
    }
    .btn:hover  { background: #e1fcc1; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); border-bottom: 1px solid #000; }
    .btn.red    { background: #ffe8e8; border-color: #f00; color: #900; }
    .btn.red:hover { background: #ffd0d0; }
    .btn.gray   { background: #f0f0f0; border-color: #ccc; color: #555; }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #b2f167;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-family: monospace;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 9999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body class="pb-28">

<div id="flash"></div>

<a href="https://hackclub.com">
  <img src="https://assets.hackclub.com/flag-orpheus-top.svg" class="flag">
</a>

<div class="flex justify-center px-4 py-10 pt-20">
  <div class="w-full max-w-2xl space-y-4">

    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">Users</h1>
        <p class="text-gray-500 text-sm">Hardware Playground</p>
      </div>
      <span id="count" class="text-gray-400 text-sm"></span>
    </div>

    <input type="text" id="search" placeholder="Search by name or email..." oninput="filterUsers()">

    <div id="user-list" class="space-y-3">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

  </div>
</div>

<!-- HUD -->
<div class="card hud-card">
  <div class="hud-left" onclick="goWithFlash('/profile')" style="cursor:pointer;">
    <img id="pfpHud" class="pfp">
    <div class="hud-info"><p id="nameHud">User</p></div>
  </div>
  <div class="hud-right">
    <button class="nav-btn" onclick="goWithFlash('/home')">
      <svg viewBox="0 0 24 24"><path d="M3 10L12 3L21 10V21H3Z"/></svg>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/guide')">
      <svg viewBox="0 0 24 24"><path d="M4 5H14A2 2 0 0 1 16 7V19H6A2 2 0 0 1 4 17Z"/><path d="M16 5H20V19H16"/></svg>
    </button>
    <button class="nav-btn" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M16 17L21 12L16 7"/><path d="M21 12H9"/><path d="M13 21H5V3H13"/></svg>
    </button>
  </div>
</div>

<!-- USER MODAL -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div style="text-align:center;margin-bottom:16px;">
      <img class="modal-avatar" id="modal-avatar" src="">
      <h2 id="modal-name" style="font-size:1.2rem;font-weight:700;"></h2>
      <p id="modal-email" style="color:#888;font-size:0.8rem;"></p>
    </div>

    <div id="modal-info"></div>

    <!-- Admin edit section -->
    <div class="edit-section" id="edit-section">
      <p style="font-size:0.75rem;font-weight:600;color:#555;margin-bottom:8px;">✏️ Edit Currency</p>
      <div class="edit-row">
        <div><label>Silicon</label><input type="number" id="edit-si"></div>
        <div><label>Conductor</label><input type="number" id="edit-co"></div>
        <div><label>Diode</label><input type="number" id="edit-di"></div>
      </div>
      <button class="btn" onclick="saveCurrency()">💾 Save</button>
      <button class="btn red" onclick="confirmReset()">🔄 Reset to 0</button>
      <button class="btn red" onclick="confirmDelete()">☠️ Delete User</button>
    </div>

    <div style="margin-top:12px;text-align:center;">
      <button class="btn gray" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let ALL_USERS   = [];
  let IS_ADMIN    = false;
  let CURRENT_USER = null; // user shown in modal
  let ME          = null;

  function getCookieUser() {
    const match = document.cookie.match(/user=([^;]+)/);
    if (!match) return null;
    try { return JSON.parse(decodeURIComponent(match[1])); } catch { return null; }
  }

  function toast(msg, ms = 2000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'copy', 1200);
    });
  }

  async function adminCall(payload) {
    const res  = await fetch('/.netlify/functions/admin', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ...payload, requester_user_id: ME?.user_id }),
    });
    return await res.json();
  }

  // ── Init ──
  document.addEventListener('DOMContentLoaded', async () => {
    ME = getCookieUser();
    if (!ME) { window.location.href = '/'; return; }

    const name   = ME.name || ME.display_name || 'User';
    const avatar = ME.picture || ME.avatar_url || '';
    document.getElementById('pfpHud').src        = avatar;
    document.getElementById('nameHud').innerText = name;

    // Check admin
    const adminRes = await adminCall({ action: 'checkadmin', slack_id: 'check' });
    IS_ADMIN = adminRes.is_admin === true;

    await loadUsers();
  });

  async function loadUsers() {
    const data = await adminCall({ action: 'list', slack_id: 'N/A' });
    if (!data.success) {
      document.getElementById('user-list').innerHTML = '<p class="text-sm text-gray-500">Could not load users.</p>';
      return;
    }
    ALL_USERS = data.users;
    renderUsers(ALL_USERS);
  }

  function filterUsers() {
    const q = document.getElementById('search').value.toLowerCase();
    renderUsers(ALL_USERS.filter(u =>
      (u.name || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q) ||
      (u.user_id || '').toLowerCase().includes(q)
    ));
  }

  function renderUsers(users) {
    document.getElementById('count').textContent = users.length + ' user' + (users.length !== 1 ? 's' : '');
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    users.forEach(u => {
      const card = document.createElement('div');
      card.className = 'user-card';
      card.onclick = () => openModal(u);
      const avatarSrc = u.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.name || '?')}`;
      card.innerHTML = `
        <img class="user-avatar" src="${avatarSrc}" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.name||'?')}'">
        <div style="flex:1;min-width:0;">
          <div class="user-name">${u.name || 'Unknown'}</div>
          <div class="user-sub">${u.email || 'no email'} · ${u.user_id || 'N/A'}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <span class="chip si">${u.silicon}</span>
          <span class="chip co">${u.conductor}</span>
          <span class="chip di">${u.diode}</span>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function openModal(u) {
    CURRENT_USER = u;
    const avatarSrc = u.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.name || '?')}`;
    document.getElementById('modal-avatar').src          = avatarSrc;
    document.getElementById('modal-name').textContent    = u.name || 'Unknown';
    document.getElementById('modal-email').textContent   = u.email || 'no email';

    const joined = u.created_at
      ? new Date(u.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : 'Unknown';

    let infoHTML = `
      <div class="info-row">
        <span class="info-label">User ID</span>
        <span style="display:flex;align-items:center;">
          <span class="info-value">${u.user_id || 'N/A'}</span>
          <button class="copy-btn" onclick="copyText('${u.user_id}', this)">copy</button>
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">Joined</span>
        <span class="info-value">${joined}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Silicon</span>
        <span class="info-value">${u.silicon}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Conductor</span>
        <span class="info-value">${u.conductor}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Diode</span>
        <span class="info-value">${u.diode}</span>
      </div>
    `;

    // Admin only — show Slack ID
    if (IS_ADMIN) {
      infoHTML += `
        <div class="info-row">
          <span class="info-label">Slack ID <span style="background:#ffe8e8;border:1px solid #f00;color:#900;font-size:0.62rem;padding:1px 5px;border-radius:8px;margin-left:3px;">admin</span></span>
          <span style="display:flex;align-items:center;">
            <span class="info-value">${u.slack_id || 'N/A'}</span>
            <button class="copy-btn" onclick="copyText('${u.slack_id}', this)">copy</button>
          </span>
        </div>
      `;
    }

    document.getElementById('modal-info').innerHTML = infoHTML;

    // Show edit section for admins
    const editSection = document.getElementById('edit-section');
    if (IS_ADMIN) {
      editSection.classList.add('show');
      document.getElementById('edit-si').value = u.silicon;
      document.getElementById('edit-co').value = u.conductor;
      document.getElementById('edit-di').value = u.diode;
    } else {
      editSection.classList.remove('show');
    }

    document.getElementById('modal').classList.add('show');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modal').classList.remove('show');
    CURRENT_USER = null;
  }

  async function saveCurrency() {
    if (!CURRENT_USER) return;
    const silicon   = parseInt(document.getElementById('edit-si').value);
    const conductor = parseInt(document.getElementById('edit-co').value);
    const diode     = parseInt(document.getElementById('edit-di').value);

    const data = await adminCall({ action: 'set', slack_id: CURRENT_USER.slack_id, silicon, conductor, diode });
    if (!data.success) { toast('❌ ' + (data.error || 'Failed')); return; }

    // Update local data
    CURRENT_USER.silicon   = data.user.silicon;
    CURRENT_USER.conductor = data.user.conductor;
    CURRENT_USER.diode     = data.user.diode;

    const u = ALL_USERS.find(u => u.slack_id === CURRENT_USER.slack_id);
    if (u) { u.silicon = data.user.silicon; u.conductor = data.user.conductor; u.diode = data.user.diode; }

    toast('✅ Saved!');
    closeModalDirect();
    renderUsers(ALL_USERS);
  }

  async function confirmReset() {
    if (!CURRENT_USER) return;
    if (!confirm(`Reset ALL currency for ${CURRENT_USER.name} to 0?`)) return;
    const data = await adminCall({ action: 'reset', slack_id: CURRENT_USER.slack_id });
    if (!data.success) { toast('❌ ' + (data.error || 'Failed')); return; }
    const u = ALL_USERS.find(u => u.slack_id === CURRENT_USER.slack_id);
    if (u) { u.silicon = 0; u.conductor = 0; u.diode = 0; }
    toast('✅ Currency reset');
    closeModalDirect();
    renderUsers(ALL_USERS);
  }

  async function confirmDelete() {
    if (!CURRENT_USER) return;
    if (!confirm(`⚠️ Delete ALL data for ${CURRENT_USER.name}?\n\nThis cannot be undone.`)) return;
    if (!confirm(`🚨 FINAL WARNING\n\nPermanently delete ${CURRENT_USER.name}?`)) return;
    const data = await adminCall({ action: 'delete', slack_id: CURRENT_USER.slack_id });
    if (!data.success) { toast('❌ ' + (data.error || 'Failed')); return; }
    ALL_USERS = ALL_USERS.filter(u => u.slack_id !== CURRENT_USER.slack_id);
    toast('✅ User deleted');
    closeModalDirect();
    renderUsers(ALL_USERS);
  }
</script>
</body>
</html>
