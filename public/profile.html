<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Hardware Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <script src="/src/script.js" onerror="document.getElementById('debug-log').textContent='script.js FAILED TO LOAD - path wrong?'"></script>
  <style>
    body { filter: none; opacity: 1; }

    .profile-card {
      background: white;
      border: 1px solid #cfcfcf;
      border-bottom: 3px solid #000;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
    }

    /* Avatar edit */
    .avatar-wrap {
      position: relative;
      width: 80px;
      margin: 0 auto 12px;
      cursor: pointer;
    }
    .avatar, .avatar-fallback {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid #000;
      object-fit: cover;
      display: block;
      background: #b2f167;
      transition: filter 0.2s;
    }
    .avatar-wrap:hover .avatar { filter: brightness(0.65); }
    .avatar-edit-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .avatar-wrap:hover .avatar-edit-icon { opacity: 1; }
    .avatar-edit-icon svg {
      width: 28px; height: 28px;
      stroke: #fff; fill: none; stroke-width: 2;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #e0e0e0;
      font-size: 0.85rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; font-size: 0.75rem; }
    .info-value { font-weight: 600; font-family: monospace; font-size: 0.82rem; text-align: right; max-width: 60%; word-break: break-all; }

    .copy-btn {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      margin-left: 6px;
      font-family: 'Space Grotesk', sans-serif;
      transition: 0.15s;
    }
    .copy-btn:hover { background: #b2f167; border-color: #000; }

    .badge {
      display: inline-block;
      background: #b2f167;
      border: 1px solid #5a8a00;
      color: #2a4a00;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .skeleton-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      margin: 0 auto 12px;
    }
    .skeleton-line {
      height: 14px; border-radius: 8px;
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      margin: 8px auto;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>

<body>
<script>
  // This runs before anything else — if you see "BODY LOADED" the page HTML is working
  window.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('debug-log');
    if (el) el.textContent = 'BODY LOADED - waiting for main script...';
  });
</script>
<div id="flash"></div>
<div id="debug-log" style="position:fixed;top:0;left:0;right:0;background:#1a1a1a;color:#b2f167;padding:10px;font-size:11px;font-family:monospace;white-space:pre-wrap;z-index:99998;max-height:50vh;overflow-y:auto;">Loading...</div>

<a href="https://hackclub.com">
  <img src="https://assets.hackclub.com/flag-orpheus-top.svg" class="flag">
</a>

<div class="flex justify-center px-4 py-10 pt-20">
  <div class="w-full max-w-lg space-y-6">

    <div class="text-center space-y-1">
      <h1 class="text-2xl font-bold">Profile</h1>
      <p class="text-gray-500 text-sm">Hardware Playground</p>
    </div>

    <div id="profile-content">
      <div class="profile-card" id="skeleton">
        <div class="skeleton-circle"></div>
        <div class="skeleton-line" style="width:60%;"></div>
        <div class="skeleton-line" style="width:40%;"></div>
      </div>
    </div>

    <div class="text-center">
      <button class="btn" onclick="goWithFlash('/home')">← Back to Dashboard</button>
    </div>

  </div>
</div>

<!-- HUD -->
<div class="card hud-card">
  <div class="hud-left" style="cursor:pointer;" onclick="goWithFlash('/profile')">
    <img id="pfpHud" class="pfp">
    <div class="hud-info"><p id="nameHud">User</p></div>
  </div>
  <div class="hud-right">
    <button class="nav-btn" onclick="goWithFlash('/home')">
      <svg viewBox="0 0 24 24"><path d="M3 10L12 3L21 10V21H3Z"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/submit')">
      <svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M8 8L12 4L16 8"/><path d="M4 20H20"/></svg>
      <span class="nav-label">Submit</span>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/guide')">
      <svg viewBox="0 0 24 24"><path d="M4 5H14A2 2 0 0 1 16 7V19H6A2 2 0 0 1 4 17Z"/><path d="M16 5H20V19H16"/></svg>
      <span class="nav-label">Guide</span>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/shop')">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M2 2H5L7 14H19L21 6H6"/></svg>
      <span class="nav-label">Shop</span>
    </button>
    <button class="nav-btn" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M16 17L21 12L16 7"/><path d="M21 12H9"/><path d="M13 21H5V3H13"/></svg>
      <span class="nav-label">Logout</span>
    </button>
  </div>
</div>

<script>
  function getCookieUser() {
    const match = document.cookie.match(/user=([^;]+)/);
    if (!match) return null;
    try { return JSON.parse(decodeURIComponent(match[1])); } catch { return null; }
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'copy', 1200);
    });
  }

  function triggerAvatarUpload() {
    document.getElementById('avatar-input').click();
  }

  async function uploadAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('Image too large. Max 2MB.'); return; }

    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64   = e.target.result;
      const me       = getCookieUser();
      const slack_id = me.sub || me.slack_id;

      try {
        const res  = await fetch('/.netlify/functions/updateavatar', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ slack_id, avatar: base64 }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('profile-avatar').src = base64;
          // Update cookie
          const user   = getCookieUser();
          user.avatar  = base64;
          user.picture = base64;
          document.cookie = 'user=' + encodeURIComponent(JSON.stringify(user)) + '; Path=/; SameSite=Lax';
        } else {
          alert('Failed: ' + (data.error || 'Unknown error'));
        }
      } catch(e) { alert('Upload failed: ' + e.message); }
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('debug-log').textContent = 'JS parsed ✓';

  function dlog(msg) {
    const el = document.getElementById('debug-log');
    if (el) el.textContent += msg + '\n';
  }

  // Use setTimeout to run after all scripts including script.js
  setTimeout(async () => {
    dlog('init running ✓');
    const me = getCookieUser();
    dlog('cookie: ' + (me ? me.user_id : 'NULL'));
    if (!me) { window.location.href = '/'; return; }

    const pathParts      = window.location.pathname.split('/').filter(Boolean);
    const rawId          = pathParts[1] || me.user_id;
    const target_user_id = rawId ? rawId.toUpperCase() : null;
    dlog('target_user_id: ' + target_user_id);

    if (!target_user_id || target_user_id === 'NULL') {
      showNotFound('No user ID found. Try logging out and back in.');
      return;
    }

    try {
      const url  = '/.netlify/functions/profile?user_id=' + encodeURIComponent(target_user_id);
      dlog('fetching: ' + url);
      const res  = await fetch(url);
      dlog('status: ' + res.status);
      const text = await res.text();
      dlog('response: ' + text.substring(0, 200));
      const data = JSON.parse(text);

      if (!data.success) { showNotFound('User not found.'); return; }

      const adminRes  = await fetch('/.netlify/functions/admin', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'checkadmin', requester_user_id: me.user_id, slack_id: 'check' }),
      });
      const adminData = await adminRes.json();
      const isAdmin   = adminData.is_admin === true;
      dlog('isAdmin: ' + isAdmin);

      renderProfile(data.user, me, isAdmin);

    } catch(e) { 
      dlog('ERROR: ' + e.message);
      showNotFound('Failed to load profile: ' + e.message); 
    }
  }, 100);

  function renderProfile(user, me, isAdmin) {
    const isMe   = me.user_id === user.user_id;
    const joined = user.created_at
      ? new Date(user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })
      : 'Unknown';

    const DEFAULT_AVATAR = 'https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png';
    const avatarSrc = user.avatar || DEFAULT_AVATAR;

    const container = document.getElementById('profile-content');
    container.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'profile-card';

    // Avatar
    if (isMe) {
      const wrap = document.createElement('div');
      wrap.className = 'avatar-wrap';
      wrap.onclick = triggerAvatarUpload;

      const img = document.createElement('img');
      img.className = 'avatar';
      img.id = 'profile-avatar';
      img.src = avatarSrc;
      img.onerror = function() { this.src = DEFAULT_AVATAR; };

      const editIcon = document.createElement('div');
      editIcon.className = 'avatar-edit-icon';
      editIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.id = 'avatar-input';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      fileInput.onchange = uploadAvatar;

      wrap.appendChild(img);
      wrap.appendChild(editIcon);
      card.appendChild(wrap);
      card.appendChild(fileInput);
    } else {
      const img = document.createElement('img');
      img.className = 'avatar';
      img.id = 'profile-avatar';
      img.src = avatarSrc;
      img.style.margin = '0 auto 12px';
      img.onerror = function() { this.src = DEFAULT_AVATAR; };
      card.appendChild(img);
    }

    // Name
    const nameEl = document.createElement('h2');
    nameEl.style.cssText = 'font-size:1.3rem;font-weight:700;';
    nameEl.textContent = user.name || 'Unknown';
    card.appendChild(nameEl);

    // You badge
    if (isMe) {
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = '✦ You';
      card.appendChild(badge);
    }

    // Email
    const emailEl = document.createElement('p');
    emailEl.style.cssText = 'color:#888;font-size:0.8rem;margin-top:4px;';
    emailEl.textContent = user.email || 'No email';
    card.appendChild(emailEl);

    // Info rows
    const infoDiv = document.createElement('div');
    infoDiv.style.marginTop = '20px';

    function addRow(label, value, showCopy, isAdmin_badge) {
      const row = document.createElement('div');
      row.className = 'info-row';

      const labelEl = document.createElement('span');
      labelEl.className = 'info-label';
      labelEl.textContent = label;
      if (isAdmin_badge) {
        const badge = document.createElement('span');
        badge.style.cssText = 'background:#ffe8e8;border:1px solid #f00;color:#900;font-size:0.62rem;padding:1px 5px;border-radius:8px;margin-left:3px;';
        badge.textContent = 'admin';
        labelEl.appendChild(badge);
      }

      const right = document.createElement('span');
      right.style.display = 'flex';
      right.style.alignItems = 'center';

      const valueEl = document.createElement('span');
      valueEl.className = 'info-value';
      valueEl.textContent = value || 'N/A';
      right.appendChild(valueEl);

      if (showCopy && value) {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'copy';
        btn.onclick = function() { copyText(value, btn); };
        right.appendChild(btn);
      }

      row.appendChild(labelEl);
      row.appendChild(right);
      infoDiv.appendChild(row);
    }

    addRow('User ID', user.user_id, true);
    addRow('Email', user.email, true);
    addRow('Joined', joined, false);
    if (isAdmin) addRow('Slack ID', user.slack_id, true, true);

    card.appendChild(infoDiv);
    container.appendChild(card);
  }

  function showNotFound(msg) {
    document.getElementById('profile-content').innerHTML =
      '<div class="profile-card">' +
        '<p style="font-size:2rem;">😕</p>' +
        '<h2 style="font-weight:700;margin-top:8px;">Not Found</h2>' +
        '<p style="color:#888;font-size:0.85rem;margin-top:4px;">' + msg + '</p>' +
      '</div>';
  }
</script>

</body>
</html>
