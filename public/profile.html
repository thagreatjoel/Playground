<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Hardware Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <script defer src="src/script.js"></script>
  <style>
    body { filter: none; opacity: 1; }

    .profile-card {
      background: white;
      border: 1px solid #cfcfcf;
      border-bottom: 3px solid #000;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #000;
      object-fit: cover;
      margin: 0 auto 12px;
      display: block;
      background: #b2f167;
    }

    .avatar-fallback {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #000;
      background: #b2f167;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 12px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #e0e0e0;
      font-size: 0.85rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; font-size: 0.75rem; }
    .info-value { font-weight: 600; font-family: monospace; font-size: 0.85rem; word-break: break-all; text-align: right; max-width: 60%; }

    .copy-btn {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      margin-left: 6px;
      font-family: 'Space Grotesk', sans-serif;
      transition: 0.15s;
    }
    .copy-btn:hover { background: #b2f167; border-color: #000; }

    .badge {
      display: inline-block;
      background: #b2f167;
      border: 1px solid #5a8a00;
      color: #2a4a00;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .not-found {
      text-align: center;
      padding: 60px 20px;
    }

    .skeleton-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      margin: 0 auto 12px;
    }
    .skeleton-line {
      height: 14px; border-radius: 8px;
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      margin: 8px auto;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

<body>
<div id="flash"></div>

<a href="https://hackclub.com">
  <img src="https://assets.hackclub.com/flag-orpheus-top.svg" class="flag">
</a>

<div class="flex justify-center px-4 py-10 pt-20">
  <div class="w-full max-w-sm space-y-6">

    <!-- TITLE -->
    <div class="text-center space-y-1">
      <h1 class="text-2xl font-bold">Profile</h1>
      <p class="text-gray-500 text-sm">Hardware Playground</p>
    </div>

    <!-- PROFILE CONTENT -->
    <div id="profile-content">
      <!-- Skeleton loader -->
      <div class="profile-card" id="skeleton">
        <div class="skeleton-circle"></div>
        <div class="skeleton-line" style="width:60%;"></div>
        <div class="skeleton-line" style="width:40%;"></div>
      </div>
    </div>

    <!-- BACK BUTTON -->
    <div class="text-center">
      <button class="btn" onclick="goWithFlash('/home')">← Back to Dashboard</button>
    </div>

  </div>
</div>

<!-- HUD -->
<div class="card hud-card">
  <div class="hud-left" style="cursor:pointer;" onclick="goWithFlash('/profile')">
    <img id="pfpHud" class="pfp">
    <div class="hud-info">
      <p id="nameHud">User</p>
    </div>
  </div>
  <div class="hud-right">
    <button class="nav-btn" onclick="goWithFlash('/home')">
      <svg viewBox="0 0 24 24"><path d="M3 10L12 3L21 10V21H3Z"/></svg>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/submit')">
      <svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M8 8L12 4L16 8"/><path d="M4 20H20"/></svg>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/guide')">
      <svg viewBox="0 0 24 24"><path d="M4 5H14A2 2 0 0 1 16 7V19H6A2 2 0 0 1 4 17Z"/><path d="M16 5H20V19H16"/></svg>
    </button>
    <button class="nav-btn" onclick="goWithFlash('/shop')">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M2 2H5L7 14H19L21 6H6"/></svg>
    </button>
    <button class="nav-btn" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M16 17L21 12L16 7"/><path d="M21 12H9"/><path d="M13 21H5V3H13"/></svg>
    </button>
  </div>
</div>

<script>
  function getCookieUser() {
    const match = document.cookie.match(/user=([^;]+)/);
    if (!match) return null;
    try { return JSON.parse(decodeURIComponent(match[1])); } catch { return null; }
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'copy', 1200);
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const me = getCookieUser();
    if (!me) { window.location.href = '/'; return; }

    // Set HUD
    const avatar = me.picture || me.avatar_url || '';
    document.getElementById('pfpHud').src        = avatar;
    document.getElementById('nameHud').innerText = me.name || me.display_name || 'User';

    // Get target user_id from URL — /profile/xxxxx or my own if no param
    const pathParts      = window.location.pathname.split('/').filter(Boolean);
    const rawId          = pathParts[1] || me.user_id;
    const target_user_id = rawId ? rawId.toUpperCase() : null;

    if (!target_user_id || target_user_id === 'null') {
      showNotFound('No user ID found. Try logging out and back in.');
      return;
    }

    // Fetch profile — simple GET, no admin needed
    try {
      const res  = await fetch('/.netlify/functions/profile?user_id=' + encodeURIComponent(target_user_id));
      const data = await res.json();

      if (!data.success) {
        console.log('Profile error:', data);
        showNotFound('User not found. (looked for: ' + target_user_id + ')');
        return;
      }

      renderProfile(data.user, me);

    } catch (e) {
      showNotFound('Failed to load profile: ' + e.message);
    }
  });

  function renderProfile(user, me) {
    const isMe = me.user_id === user.user_id;
    const joined = user.created_at
      ? new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : 'Unknown';

    const avatarHTML = user.avatar
      ? `<img class="avatar" src="${user.avatar}" onerror="this.style.display='none'">`
      : `<div class="avatar-fallback">${(user.name || '?')[0].toUpperCase()}</div>`;

    document.getElementById('profile-content').innerHTML = `
      <div class="profile-card">
        ${avatarHTML}
        <h2 style="font-size:1.3rem;font-weight:700;">${user.name || 'Unknown'}</h2>
        ${isMe ? '<span class="badge">✦ You</span>' : ''}
        <p style="color:#888;font-size:0.8rem;margin-top:4px;">${user.email || 'No email'}</p>

        <div style="margin-top:20px;">
          <div class="info-row">
            <span class="info-label">User ID</span>
            <span style="display:flex;align-items:center;">
              <span class="info-value">${user.user_id || 'N/A'}</span>
              <button class="copy-btn" onclick="copyText('${user.user_id}', this)">copy</button>
            </span>
          </div>
          <div class="info-row">
            <span class="info-label">Slack ID</span>
            <span style="display:flex;align-items:center;">
              <span class="info-value">${user.slack_id || 'N/A'}</span>
              <button class="copy-btn" onclick="copyText('${user.slack_id}', this)">copy</button>
            </span>
          </div>
          <div class="info-row">
            <span class="info-label">Email</span>
            <span style="display:flex;align-items:center;">
              <span class="info-value">${user.email || 'N/A'}</span>
              <button class="copy-btn" onclick="copyText('${user.email}', this)">copy</button>
            </span>
          </div>
          <div class="info-row">
            <span class="info-label">Joined</span>
            <span class="info-value">${joined}</span>
          </div>
        </div>
      </div>
    `;
  }

  function showNotFound(msg) {
    document.getElementById('profile-content').innerHTML = `
      <div class="not-found card">
        <p style="font-size:2rem;">😕</p>
        <h2 style="font-weight:700;margin-top:8px;">Not Found</h2>
        <p style="color:#888;font-size:0.85rem;margin-top:4px;">${msg}</p>
      </div>
    `;
  }
</script>

</body>
</html>
