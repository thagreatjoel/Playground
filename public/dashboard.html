<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard • Hardware Playground</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/styles.css">
  <script defer src="scr/script.js"></script>
</head>

<body class="pb-24">

<div id="flash"></div>

<!-- FLAG -->
<a href="https://hackclub.com">
  <img src="https://assets.hackclub.com/flag-orpheus-top.svg" class="flag">
</a>

<!-- MAIN CONTENT -->
<div class="flex justify-center px-4 py-10">
  <div class="w-full max-w-3xl space-y-10">

    <div class="text-center space-y-3">
      <h1 class="text-4xl font-bold">Dashboard</h1>
      <p class="text-gray-600">Your progress and stats</p>
    </div>

    <!-- PLACEHOLDER CONTENT -->
    <div class="card text-center">
      <p>Projects, stats, and activity will show here.</p>
    </div>

  </div>
</div>

<!-- 🔥 BOTTOM BAR -->
<div class="bottom-bar">

  <!-- LEFT: PROFILE -->
  <div class="bar-left">
    <img src="https://via.placeholder.com/32" class="pfp">
    
    <div class="user-info">
      <p class="username">Joel</p>
      <div class="stats">
        <span>🧪 120</span>
        <span>🔩 45</span>
        <span>⚡ 80</span>
      </div>
    </div>
  </div>

  <!-- CENTER: SETTINGS -->
  <div class="bar-center">
    <button class="icon-btn">⚙️</button>
  </div>

  <!-- RIGHT: NAV -->
  <div class="bar-right">
    <button class="icon-btn active" onclick="goWithFlash('/dashboard')">🏠</button>
    <button class="icon-btn" onclick="goWithFlash('/submit')">📤</button>
    <button class="icon-btn" onclick="goWithFlash('/guide')">📖</button>
    <button class="icon-btn" onclick="goWithFlash('/shop')">🛒</button>
  </div>

</div>

</body>
</html>
