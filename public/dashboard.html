<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard • Hardware Playground</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- YOUR EXISTING CSS -->
  <link rel="stylesheet" href="src/style.css">

  <!-- YOUR EXISTING JS -->
  <script defer src="src/script.js"></script>
</head>

<body class="pb-28">

<!-- FLASH -->
<div id="flash"></div>

<!-- FLAG -->
<a href="https://hackclub.com">
  <img src="https://assets.hackclub.com/flag-orpheus-top.svg" class="flag">
</a>

<!-- MAIN CONTENT -->
<div class="flex justify-center px-4 py-10">
  <div class="w-full max-w-4xl space-y-10">

    <!-- TITLE -->
    <div class="text-center space-y-3">
      <h1 class="text-4xl font-bold">Dashboard</h1>
      <p class="text-gray-600">Your progress</p>
    </div>

    <!-- CARD -->
    <div class="card text-center">
      Projects and activity will appear here.
    </div>

  </div>
</div>

<!-- 🔥 HUD (ONE BAR) -->
<div class="card">

  <!-- PROFILE -->
  <div class="hud-left" onclick="goWithFlash('/profile')">
    <img src="https://cataas.com/cat" class="pfp">

    <div>
      <p class="name">Joel</p>
      <div class="stats">
        <span><img src="/assets/Silicon.svg" class="stat-icon"> 120</span>
        <span><img src="/assets/conductor.svg" class="stat-icon"> 45</span>
        <span><img src="/assets/diode.svg" class="stat-icon"> 80</span>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="hud-right">

    <!-- DASHBOARD -->
    <button class="nav-btn active" onclick="goWithFlash('/dashboard')">
      <svg viewBox="0 0 24 24">
        <path d="M3 10L12 3L21 10V21H3Z"/>
      </svg>
    </button>

    <!-- SUBMIT -->
    <button class="nav-btn" onclick="goWithFlash('/submit')">
      <svg viewBox="0 0 24 24">
        <path d="M12 16V4"/>
        <path d="M8 8L12 4L16 8"/>
        <path d="M4 20H20"/>
      </svg>
    </button>

    <!-- GUIDE -->
    <button class="nav-btn" onclick="goWithFlash('/guide')">
      <svg viewBox="0 0 24 24">
        <path d="M4 5H14A2 2 0 0 1 16 7V19H6A2 2 0 0 1 4 17Z"/>
        <path d="M16 5H20V19H16"/>
      </svg>
    </button>

    <!-- SHOP -->
    <button class="nav-btn" onclick="goWithFlash('/shop')">
      <svg viewBox="0 0 24 24">
        <circle cx="9" cy="20" r="1"/>
        <circle cx="17" cy="20" r="1"/>
        <path d="M2 2H5L7 14H19L21 6H6"/>
      </svg>
    </button>

  </div>

</div>

</body>
</html>
