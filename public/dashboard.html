<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/style.css">
  <script defer src="src/script.js"></script>
</head>

<body class="pb-28">

<!-- FLASH -->
<div id="flash"></div>

<!-- FLAG -->
<a href="https://hackclub.com">
  <img src="https://assets.hackclub.com/flag-orpheus-top.svg" class="flag">
</a>

<!-- MAIN -->
<div id="page" class="flex justify-center px-4 py-10">
  <div class="w-full max-w-3xl space-y-8">

    <!-- TITLE -->
    <div class="text-center space-y-2">
      <h1 class="text-4xl font-bold">Dashboard</h1>
      <p class="text-gray-600">Hardware Playground</p>
    </div>

    <!-- PROFILE CARD -->
    <div class="card text-center space-y-4">
      <img id="pfp" class="pfp mx-auto">

      <div>
        <h2 id="name" class="text-xl font-semibold">Loading...</h2>
        <p id="email" class="text-gray-500 text-sm"></p>
        <p id="slack" class="text-gray-500 text-sm"></p>
      </div>
    </div>

    <!-- CURRENCY CARD -->
    <div class="card text-center space-y-4">
      <h2 class="text-lg font-semibold">Your Resources</h2>

      <div class="flex justify-center gap-6 text-sm">

        <div>
          <img src="/src/Silicon.svg" class="stat-icon mx-auto">
          <p id="silicon">0</p>
        </div>

        <div>
          <img src="/src/conductor.svg" class="stat-icon mx-auto">
          <p id="conductor">0</p>
        </div>

        <div>
          <img src="/src/diode.svg" class="stat-icon mx-auto">
          <p id="diode">0</p>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- 🔥 HUD -->
<div class="card hud-card">

  <!-- PROFILE -->
  <div class="hud-left" onclick="goWithFlash('/profile')">
    <img id="pfpHud" class="pfp">

    <div>
      <p id="nameHud">User</p>
      <div class="stats">
        <span><img src="/src/Silicon.svg" class="stat-icon"> <span id="siliconHud">0</span></span>
        <span><img src="/src/conductor.svg" class="stat-icon"> <span id="conductorHud">0</span></span>
        <span><img src="/src/diode.svg" class="stat-icon"> <span id="diodeHud">0</span></span>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="hud-right">
    <button class="nav-btn active" onclick="goWithFlash('/dashboard')">🏠</button>
    <button class="nav-btn" onclick="goWithFlash('/submit')">📤</button>
    <button class="nav-btn" onclick="goWithFlash('/guide')">📖</button>
    <button class="nav-btn" onclick="goWithFlash('/shop')">🛒</button>
  </div>

</div>



</body>
</html>
